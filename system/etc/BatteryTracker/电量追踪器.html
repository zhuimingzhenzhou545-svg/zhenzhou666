<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电量追踪器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(25, 25, 55, 0.85);
            --accent-cyan: #00f5ff;
            --accent-purple: #b829ff;
            --accent-pink: #ff2d95;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.6);
            --glow-purple: 0 0 20px rgba(184, 41, 255, 0.6);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; z-index: 0;
        }

        .bg-glow {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            filter: blur(150px); opacity: 0.3; pointer-events: none; z-index: 0;
        }
        .bg-glow-1 { top: -200px; left: -200px; background: var(--accent-cyan); }
        .bg-glow-2 { bottom: -200px; right: -200px; background: var(--accent-purple); }

        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 30px 20px; }

        header { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

        .logo { display: inline-flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .logo-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; box-shadow: var(--glow-cyan);
        }
        h1 {
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }
        .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-top: 8px; }

        .info-bar {
            background: var(--bg-card); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px;
            border: 1px solid rgba(0, 245, 255, 0.2); text-align: center; color: var(--text-secondary);
            font-size: 0.9rem; animation: fadeIn 0.8s ease-out 0.1s both;
        }
        .info-bar strong { color: var(--accent-cyan); }
        .info-url { color: var(--accent-purple); font-weight: 500; margin-top: 5px; }

        .actions { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; animation: fadeIn 0.8s ease-out 0.2s both; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn {
            padding: 12px 28px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 500;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), #0099ff);
            color: #000; box-shadow: var(--glow-cyan);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 245, 255, 0.8); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid rgba(0, 245, 255, 0.3); }
        .btn-secondary:hover { border-color: var(--accent-cyan); box-shadow: var(--glow-cyan); }

        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-bottom: 30px; animation: fadeIn 0.8s ease-out 0.3s both;
        }
        .stat-card {
            background: var(--bg-card); border-radius: 16px; padding: 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .stat-card:hover { border-color: var(--accent-cyan); transform: translateY(-3px); }
        .stat-value {
            font-size: 2rem; font-weight: 900;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-label { color: var(--text-secondary); font-size: 0.85rem; margin-top: 5px; }

        .records { display: flex; flex-direction: column; gap: 15px; }

        .record-card {
            background: var(--bg-card); border-radius: 16px; padding: 20px 25px;
            border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
            display: grid; grid-template-columns: auto 1fr auto; gap: 20px; align-items: center;
            animation: fadeInUp 0.5s ease-out both; transition: all 0.3s ease;
        }
        .record-card:hover { border-color: var(--accent-cyan); box-shadow: var(--glow-cyan); transform: translateX(5px); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .battery-level {
            width: 70px; height: 100px; background: rgba(0, 0, 0, 0.4);
            border-radius: 10px; position: relative; border: 2px solid rgba(255, 255, 255, 0.2); overflow: hidden;
        }
        .battery-level::after {
            content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
            width: 24px; height: 6px; background: rgba(255, 255, 255, 0.3); border-radius: 2px 2px 0 0;
        }
        .battery-fill {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--accent-cyan), #00ff88);
            transition: height 0.5s ease; border-radius: 0 0 6px 6px;
        }
        .battery-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: 900; font-size: 1rem; color: #fff; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); z-index: 1;
        }

        .record-info { display: flex; flex-direction: column; gap: 8px; }
        .record-time { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 0.9rem; }
        .record-time-icon { color: var(--accent-cyan); }
        .record-duration { color: var(--accent-purple); font-weight: 500; }
        .record-index {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #000; width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
        }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        .empty-title { font-size: 1.3rem; margin-bottom: 10px; color: var(--text-primary); }

        .loading { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(0, 245, 255, 0.2);
            border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; color: var(--text-secondary); }

        .error-state {
            text-align: center; padding: 40px; background: rgba(255, 45, 45, 0.1);
            border-radius: 16px; border: 1px solid rgba(255, 45, 45, 0.3); color: #ff6b6b;
        }

        footer { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 0.85rem; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .logo-icon { width: 48px; height: 48px; font-size: 22px; }
            .record-card { grid-template-columns: auto 1fr; gap: 15px; }
            .record-index { display: none; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>电量追踪器</h1>
            </div>
            <p class="subtitle">实时监控设备电量变化</p>
        </header>

        <div class="info-bar">
            📱 在浏览器中访问 <strong>http://localhost:8888</strong> 或 <strong>http://设备IP:8888</strong> 查看
            <div class="info-url">数据来源：/sdcard/BatteryTracker/log.txt</div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="loadData()">
                <span>🔄</span> 刷新数据
            </button>
            <button class="btn btn-secondary" onclick="exportCSV()">
                <span>📥</span> 导出CSV
            </button>
            <button class="btn btn-secondary" onclick="clearData()">
                <span>🗑️</span> 清空日志
            </button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalRecords">0</div>
                <div class="stat-label">记录总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="startLevel">-</div>
                <div class="stat-label">起始电量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="endLevel">-</div>
                <div class="stat-label">结束电量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalDuration">-</div>
                <div class="stat-label">总耗时</div>
            </div>
        </div>

        <div class="records" id="records">
            <div class="loading">
                <div class="spinner"></div>
                <div class="loading-text">正在加载数据...</div>
            </div>
        </div>

        <footer>
            ⚡ 电量追踪器 Web UI · v2.0
        </footer>
    </div>

    <script>
        let batteryData = [];

        // 格式秒数为 HH时MM分SS秒
        function formatSecondsToTime(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${hours}时${minutes}分${seconds}秒`;
        }

        // 解析日志行
        function parseLine(line) {
            const regex = /电量(\d+)%，(\d+)时(\d+)分(\d+)秒，耗时(\d+)时(\d+)分(\d+)秒/;
            const match = line.match(regex);
            if (match) {
                return {
                    level: parseInt(match[1]),
                    time: `${match[2]}时${match[3]}分${match[4]}秒`,
                    duration: `${match[5]}时${match[6]}分${match[7]}秒`,
                    durationSeconds: parseInt(match[5]) * 3600 + parseInt(match[6]) * 60 + parseInt(match[7])
                };
            }
            return null;
        }

        // 加载数据 - 通过Web服务器API
        async function loadData() {
            const recordsEl = document.getElementById('records');
            recordsEl.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">正在加载数据...</div>
                </div>
            `;

            try {
                const response = await fetch('/api/data', { cache: 'no-store' });
                if (response.ok) {
                    const text = await response.text();
                    processData(text);
                } else {
                    // 尝试本地文件读取
                    loadFromLocal();
                }
            } catch (error) {
                // 尝试本地文件读取或显示演示数据
                loadFromLocal();
            }
        }

        // 从本地读取（file://协议）
        async function loadFromLocal() {
            try {
                const response = await fetch('file:///sdcard/BatteryTracker/log.txt');
                if (response.ok) {
                    const text = await response.text();
                    processData(text);
                } else {
                    loadDemoData();
                }
            } catch (e) {
                loadDemoData();
            }
        }

        // 演示数据
        function loadDemoData() {
            const demoData = `电量85%，16时30分00秒，耗时00时05分30秒
电量84%，16时35分30秒，耗时00时12分45秒
电量82%，16时48分15秒，耗时00时25分00秒
电量80%，17时13分15秒，耗时00时45分10秒
电量75%，17时58分25秒，耗时01时30分00秒
电量70%，19时28分25秒，耗时02时45分30秒
电量65%，20时13分55秒，耗时03时15分00秒
电量60%，20时28分55秒，耗时03时30分00秒`;

            const recordsEl = document.getElementById('records');
            recordsEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <div class="empty-title">正在显示演示数据</div>
                    <p style="margin-top:10px;font-size:0.85rem;color:rgba(255,255,255,0.5)">请确保已刷入模块并启动服务</p>
                </div>
            `;
            processData(demoData);
        }

        // 处理数据
        function processData(text) {
            const lines = text.trim().split('\n').filter(line => line.trim());
            batteryData = lines.map(line => parseLine(line)).filter(item => item !== null);

            document.getElementById('totalRecords').textContent = batteryData.length;
            if (batteryData.length > 0) {
                document.getElementById('startLevel').textContent = batteryData[0].level + '%';
                document.getElementById('endLevel').textContent = batteryData[batteryData.length - 1].level + '%';

                const totalSeconds = batteryData.reduce((sum, item) => sum + item.durationSeconds, 0);
                document.getElementById('totalDuration').textContent = formatSecondsToTime(totalSeconds);
            }

            renderRecords();
        }

        // 渲染记录列表
        function renderRecords() {
            const recordsEl = document.getElementById('records');

            if (batteryData.length === 0) {
                recordsEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-title">暂无数据</div>
                        <p>请确保电量追踪模块已运行并产生数据</p>
                    </div>
                `;
                return;
            }

            recordsEl.innerHTML = batteryData.map((item, index) => `
                <div class="record-card" style="animation-delay: ${index * 0.05}s">
                    <div class="battery-level">
                        <div class="battery-fill" style="height: ${item.level}%"></div>
                        <span class="battery-text">${item.level}%</span>
                    </div>
                    <div class="record-info">
                        <div class="record-time">
                            <span class="record-time-icon">🕐</span>
                            <span>${item.time}</span>
                        </div>
                        <div class="record-duration">
                            ⏱️ 耗时: ${item.duration}
                        </div>
                    </div>
                    <div class="record-index">${index + 1}</div>
                </div>
            `).join('');
        }

        // 导出CSV
        function exportCSV() {
            if (batteryData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            let csv = '序号,电量百分比,时间,耗时\n';
            batteryData.forEach((item, index) => {
                csv += `${index + 1},${item.level}%,${item.time},${item.duration}\n`;
            });

            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `电量追踪_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 清空日志（通过API）
        async function clearData() {
            if (!confirm('确定要清空所有电量日志数据吗？')) return;
            try {
                const response = await fetch('/api/clear', { method: 'POST' });
                alert('已请求清空日志，请刷新页面');
            } catch (e) {
                alert('需要通过Web服务器访问才能清空，请使用 http://localhost:8888');
            }
        }

        // 页面加载时自动读取
        window.onload = loadData;
    </script>
</body>
</html>
